<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FeedbackLoop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">FeedbackLoop</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Products</a>
                <a href="/admin" class="nav-link">Admin</a>
            </div>
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>FeedbackLoop — Demo for <a href="https://github.com/anthropics/ai-products-os" class="footer-link">AI Product OS</a></span>
            <span class="footer-meta">Flask + SQLite + Vanilla JS</span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
